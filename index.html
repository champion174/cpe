<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Practice Engine</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header>
        <h1>Practice Engine</h1>
        <nav>
            <button onclick="showView('home')">Daily 5</button>
            <button onclick="showView('practice-setup')">Custom Practice</button>
            <a href="YOUR_GOOGLE_FORM_LINK_HERE" target="_blank" class="btn-link">Add a Question</a>
        </nav>
    </header>

    <main>
        <section id="loading" class="view active">
            <h2>Loading Database...</h2>
        </section>

        <section id="home" class="view">
            <h2>Today's Challenge</h2>
            <p>5 randomly selected questions across Organic, Inorganic, Physical, and Aptitude.</p>
            <button onclick="startDaily5()">Start Daily 5</button>
        </section>

        <section id="practice-setup" class="view">
            <h2>Setup Practice</h2>
            <label>Category:</label>
            <select id="category-filter">
                <option value="All">All Categories</option>
                <option value="Organic">Organic Chemistry</option>
                <option value="Physical">Physical Chemistry</option>
                <option value="Inorganic">Inorganic Chemistry</option>
                <option value="Aptitude">Aptitude</option>
            </select>
            <button onclick="startCustomPractice()">Start Practice</button>
        </section>

        <section id="quiz-ui" class="view">
            <div id="timer-display">Time Left: <span id="time">00:00</span></div>
            <h3 id="question-text"></h3>
            <div id="options-container"></div>
            <div class="quiz-controls">
                <button onclick="prevQuestion()">Previous</button>
                <button onclick="nextQuestion()">Next</button>
                <button onclick="showReview()">Review & Submit</button>
            </div>
        </section>

        <section id="results" class="view">
            <h2>Quiz Complete</h2>
            <h3 id="score-display"></h3>
            <div id="review-container"></div>
            <button onclick="showView('home')">Back to Home</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
